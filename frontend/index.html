<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Severity Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Inter', sans-serif;
        background: #f5f7fa;
        color: #1a1a2e;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.__mapsReady = false;
      window.__mapsReadyCallbacks = [];
      function __onMapsReady() {
        window.__mapsReady = true;
        (window.__mapsReadyCallbacks || []).forEach(fn => fn());
      }
    </script>
    <script id="gmaps-loader"></script>
    <script type="module">
      const key = import.meta.env?.VITE_GOOGLE_MAPS_API_KEY || '';
      const s = document.getElementById('gmaps-loader');
      s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&v=beta&libraries=places&callback=__onMapsReady&loading=async`;
      s.async = true;
      s.defer = true;
    </script>
  </body>
</html>
